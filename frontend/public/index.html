<!-- ─── Service Worker + PWA install ─── -->
<script>
  // Captura o evento de instalação PWA antes do React montar
  window._installPrompt = null;
  window.addEventListener('beforeinstallprompt', function(e) {
    e.preventDefault();
    window._installPrompt = e;
    // Notifica o React caso já esteja montado
    if (window._onInstallPromptReady) window._onInstallPromptReady();
  });

  // iOS (Safari/Chrome/Firefox — todos WebKit) NUNCA dispara beforeinstallprompt.
  // Precisamos detectar e mostrar instruções manuais (Compartilhar > Adicionar à Tela de Início).
  window._isIOS = function() {
    var ua = navigator.userAgent;
    var isIOSDevice = /iPad|iPhone|iPod/.test(ua) ||
      (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1); // iPadOS 13+ se identifica como Mac
    return isIOSDevice;
  };

  window._isStandalone = function() {
    return window.navigator.standalone === true ||
      (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches);
  };

  // Registra o Service Worker (necessário para o PWA ser instalável e para push)
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').then(function(reg) {
      console.log('[SW] Registrado:', reg.scope);
    }).catch(function(err) {
      console.warn('[SW] Falha no registro:', err);
    });
  }

  // Escuta mensagens do SW (clique em notificação) para navegar a uma tela.
  // tc-app.jsx define window.envoxersNavigate ao montar.
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.addEventListener('message', function(event) {
      if (event.data && event.data.type === 'NAVIGATE' && window.envoxersNavigate) {
        window.envoxersNavigate(event.data.view);
      }
    });
  }

  // Helpers de push expostos globalmente para o React usar (ver PushPermissionBanner em tc-app.jsx)
  window.pushHelpers = {
    isSupported: function() {
      return 'PushManager' in window && 'serviceWorker' in navigator;
    },

    getPermission: function() {
      return Notification.permission; // 'default' | 'granted' | 'denied'
    },

    // Converte base64url para Uint8Array (necessário para applicationServerKey)
    _urlBase64ToUint8Array: function(base64String) {
      var padding = '='.repeat((4 - base64String.length % 4) % 4);
      var base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
      var raw = window.atob(base64);
      var arr = new Uint8Array(raw.length);
      for (var i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);
      return arr;
    },

    // Pede permissão e cria subscription; retorna {endpoint, p256dh, auth} ou null.
    // Reusa window.EnvoxersAPI (tc-api.jsx) pra Authorization + tratamento de 401 —
    // já carregado nesse ponto (script roda depois de todos os tc-*.jsx no index.html).
    subscribe: async function() {
      if (!this.isSupported()) return null;

      var permission = await Notification.requestPermission();
      if (permission !== 'granted') return null;

      var reg = await navigator.serviceWorker.ready;
      var vapidData = await window.EnvoxersAPI.api('/push/vapid-public-key');

      var sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: this._urlBase64ToUint8Array(vapidData.public_key),
      });

      var json = sub.toJSON();
      var body = {
        endpoint: json.endpoint,
        p256dh: json.keys.p256dh,
        auth: json.keys.auth,
        user_agent: navigator.userAgent,
      };

      await window.EnvoxersAPI.api('/push/subscribe', { method: 'POST', body: JSON.stringify(body) });
      return body;
    },

    unsubscribe: async function() {
      var reg = await navigator.serviceWorker.ready;
      var sub = await reg.pushManager.getSubscription();
      if (!sub) return;
      var endpoint = sub.endpoint;
      await sub.unsubscribe();
      await window.EnvoxersAPI.api('/push/unsubscribe', { method: 'DELETE', body: JSON.stringify({ endpoint: endpoint }) });
    },
  };
</script>
