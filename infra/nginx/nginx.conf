server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # Portal do Cliente é uma SPA própria, com seu próprio index.html — precisa
    # de fallback escopado ao próprio prefixo, senão qualquer caminho não
    # encontrado sob /portal/ cai no fallback genérico abaixo (index.html do
    # app INTERNO), que quebra em silêncio: os scripts do app interno são
    # carregados por caminho relativo, e a URL errada faz o navegador resolver
    # esses caminhos relativos a partir de /portal/, gerando 404 silencioso em
    # tudo e tela branca.
    location /portal/ {
        try_files $uri $uri/ /portal/index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Service Worker precisa ser sempre revalidado — cache longo aqui trava a
    # atualização do SW (e por tabela, do app inteiro) no PWA instalado no iOS.
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location ~* \.(js|css|png|jpg|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
